name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      evm: ${{ steps.filter.outputs.evm }}
      stellar: ${{ steps.filter.outputs.stellar }}
      solana: ${{ steps.filter.outputs.solana }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            evm:
              - 'evm/**'
            stellar:
              - 'stellar/**'
            solana:
              - 'solana/**'

  evm:
    needs: changes
    if: needs.changes.outputs.evm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prettier --check --ignore-path ../.prettierignore .
      - run: npx hardhat compile
      - run: npx hardhat test

  stellar:
    needs: changes
    if: needs.changes.outputs.stellar == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      - run: cargo test --workspace

  solana:
    needs: changes
    if: needs.changes.outputs.solana == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: heyAyushh/setup-anchor@v4.2
        with:
          anchor-version: 0.30.1
      - run: solana-keygen new --no-bip39-passphrase --force
      - run: anchor build
      - run: npm ci
      - run: |
          solana-test-validator --reset --quiet &
          sleep 5
          solana config set --url localhost
          solana airdrop 100
          anchor deploy
          ANCHOR_PROVIDER_URL=http://127.0.0.1:8899 ANCHOR_WALLET=~/.config/solana/id.json npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts
